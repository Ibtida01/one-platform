name: ONE Platform — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── JOB 1: Lint + Tests ───────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/one_test
      ANTHROPIC_API_KEY: sk-ant-test-dummy
      GEMINI_API_KEY: dummy-gemini-key
      GROQ_API_KEY: dummy-groq-key
      OLLAMA_MODEL: llama3.1
      NODE_ENV: test
      PORT: 3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Check server syntax
        run: |
          node --check server/index.js
          node --check server/db.js
          node --check server/lib/ai.js
          node --check server/lib/tokenGen.js
          node --check server/middleware/security.js
          node --check server/routes/intake.js
          node --check server/routes/tickets.js
          node --check server/routes/citizens.js
          node --check server/routes/services.js
          node --check server/routes/stats.js
          echo "✅ All server files syntax OK"

      - name: Run test suite
        run: node tests/run-tests.js

  # ─── JOB 2: Build frontend ─────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install and build client
        run: |
          cd client
          npm install
          npm run build
          echo "✅ Frontend built successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7