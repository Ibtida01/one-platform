name: ONE Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      PORT: 3001
      AI_PROVIDER: groq
      GROQ_API_KEY: dummy-key-for-ci
      DATABASE_URL: postgresql://test:test@localhost/test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install
      - name: Syntax check server files
        run: |
          for f in server/index.js server/db.js server/lib/ai.js server/lib/tokenGen.js \
                    server/middleware/security.js server/routes/intake.js \
                    server/routes/tickets.js server/routes/citizens.js \
                    server/routes/services.js server/routes/stats.js \
                    server/routes/officers.js server/routes/appointments.js \
                    server/routes/feedback.js; do
            node --check $f && echo "OK: $f"
          done
      - name: Run test suite
        run: node tests/run-tests.js

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install and build
        run: cd client && npm install && npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist/
          retention-days: 7

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli@latest
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service one-platform
      - name: Health check
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_URL/api/health" || echo "000")
          echo "Health check status: $STATUS"
