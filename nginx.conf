# ONE Platform — nginx Load Balancer Config
# File: /etc/nginx/sites-available/one-platform
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/one-platform
#   sudo ln -s /etc/nginx/sites-available/one-platform /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ─── Upstream — Node.js cluster (4 processes via PM2) ─────────────────────────
upstream one_backend {
    # Round-robin load balancing across PM2 cluster instances
    server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3003 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3004 weight=1 max_fails=3 fail_timeout=30s;

    # Use IP hash for sticky sessions (citizen stays on same instance)
    # ip_hash;

    keepalive 32;
}

# ─── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=intake:10m rate=5r/m;   # 5 intake requests/minute/IP
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;  # 30 API requests/minute/IP
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/m; # 100 static requests/minute/IP

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name one.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name one.yourdomain.com;

    # SSL — use certbot: sudo certbot --nginx -d one.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/one.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/one.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Request size limits
    client_max_body_size 100k;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── AI Intake endpoint — strict rate limiting ───────────────────────────
    location /api/intake {
        limit_req zone=intake burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://one_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;   # AI calls can take a few seconds
    }

    # ─── All other API routes ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://one_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ─── Static frontend files ────────────────────────────────────────────────
    location / {
        limit_req zone=static burst=20 nodelay;

        root /home/ubuntu/one-platform/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache HTML (SPA routing)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ─── Health check (no rate limiting) ─────────────────────────────────────
    location /api/health {
        proxy_pass http://one_backend;
        access_log off;
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
}
